<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vidyartha Parents Portal</title>
    
   <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Vidyartha%20Portal%22,%22short_name%22:%22Vidyartha%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#1a73e8%22,%22icons%22:[{%22src%22:%22https://github.com/Maduranga128/Vidyartha-parents-portal/blob/00c7a4be1c6c0c76a5b0ec9961897e8cdfd9a4b1/logo.jpeg?v=2%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]} ">
    <meta name="theme-color" content="#1a73e8">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid #1a73e8; }
        h2, h3 { text-align: center; color: #1a73e8; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .result-card { background: #fff; padding: 15px; margin-top: 15px; border: 1px solid #eee; border-left: 6px solid #34a853; border-radius: 8px; font-size: 15px; position: relative; line-height: 1.8; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; float: right; font-weight: bold; font-size: 12px; }
        .data-label { font-weight: bold; color: #1a73e8; width: 125px; display: inline-block; }
        .logout-btn { background: #6c757d; margin-top: 20px; }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <h2>Vidyartha Login</h2>
    <input type="text" id="username" placeholder="පරිශීලක නාමය">
    <input type="password" id="password" placeholder="මුරපදය">
    <button onclick="checkLogin()">Login</button>
</div>

<div id="mainApp" class="container hidden">
    <h2>Parents Portal</h2>
    <div id="addForm">
        <h3>දත්ත ඇතුළත් කරන්න</h3>
        <input type="text" id="studentName" placeholder="ළමයාගේ නම">
        <input type="text" id="studentClass" placeholder="පන්තිය (උදා: 10-B)">
        <input type="text" id="parentName" placeholder="දෙමාපියන්ගේ නම">
        <input type="text" id="job" placeholder="රැකියාව">
        <textarea id="support" placeholder="ලබාදිය හැකි සහයයන්"></textarea>
        <input type="tel" id="phone" placeholder="දුරකථන අංකය">
        <input type="text" id="address" placeholder="ලිපිනය">
        <button id="saveBtn" onclick="saveParentData()">Save to Cloud</button>
    </div>

    <div class="search-section" style="margin-top:20px; border-top: 2px solid #eee; padding-top:10px;">
        <h3>සොයන්න</h3>
        <select id="searchType">
            <option value="studentName">ළමයාගේ නම අනුව</option>
            <option value="job">රැකියාව අනුව</option>
            <option value="studentClass">පන්තිය අනුව</option>
        </select>
        <input type="text" id="searchInput" placeholder="මෙහි ටයිප් කරන්න..." onkeyup="searchParent()">
        <div id="searchResults"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDn-IYmpALOqog-o-E4N3JA_ZaXWvnGAbs",
    authDomain: "vidyartha-parents-portal.firebaseapp.com",
    projectId: "vidyartha-parents-portal",
    storageBucket: "vidyartha-parents-portal.firebasestorage.app",
    messagingSenderId: "33674213629",
    appId: "1:33674213629:web:30eb2ff3ec74d66100e694"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
  }

  window.checkLogin = () => {
    if (document.getElementById("username").value === "vidyartha" && document.getElementById("password").value === "19460101") {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
    } else { alert("මුරපදය වැරදියි!"); }
  };

  window.logout = () => { location.reload(); };

  window.saveParentData = async () => {
    const sName = document.getElementById("studentName").value.trim();
    const sClass = document.getElementById("studentClass").value.trim();
    const pName = document.getElementById("parentName").value.trim();
    const job = document.getElementById("job").value.trim();
    const support = document.getElementById("support").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();

    if (!sName || !phone) { alert("නම සහ දුරකථන අංකය අනිවාර්යයි!"); return; }

    const saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled = true;

    try {
        const q = query(collection(db, "parents"), where("studentName", "==", sName), where("studentClass", "==", sClass));
        const check = await getDocs(q);
        if (!check.empty) { alert("මෙම දත්තය දැනටමත් පද්ධතියේ ඇත!"); saveBtn.disabled = false; return; }

        await addDoc(collection(db, "parents"), {
            studentName: sName,
            studentClass: sClass,
            parentName: pName,
            job: job,
            support: support,
            phone: phone,
            address: address,
            timestamp: new Date()
        });
        alert("සාර්ථකව සුරැකුණා!");
        document.querySelectorAll("#addForm input, #addForm textarea").forEach(el => el.value = "");
    } catch(e) { alert("Error: " + e.message); } finally { saveBtn.disabled = false; }
  };

  window.searchParent = async () => {
    const text = document.getElementById("searchInput").value;
    const type = document.getElementById("searchType").value;
    const resDiv = document.getElementById("searchResults");
    resDiv.innerHTML = "";
    if (text.length < 1) return;

    try {
        const q = query(collection(db, "parents"), where(type, ">=", text), where(type, "<=", text + '\\uf8ff'));
        const snap = await getDocs(q);
        
        snap.forEach((docRef) => {
            const d = docRef.data();
            const id = docRef.id;
            resDiv.innerHTML += `
                <div class="result-card" id="card-${id}">
                    <button class="delete-btn" onclick="deleteEntry('${id}')">Delete</button>
                    <div><span class="data-label">ළමයාගේ නම:</span> ${d.studentName || '-'}</div>
                    <div><span class="data-label">පන්තිය:</span> ${d.studentClass || '-'}</div>
                    <div><span class="data-label">මව්පිය නම:</span> ${d.parentName || '-'}</div>
                    <div><span class="data-label">රැකියාව:</span> ${d.job || '-'}</div>
                    <div><span class="data-label">සහයයන්:</span> ${d.support || '-'}</div>
                    <div><span class="data-label">දුරකථන:</span> ${d.phone || '-'}</div>
                    <div><span class="data-label">ලිපිනය:</span> ${d.address || '-'}</div>
                </div>`;
        });
    } catch(e) { console.error(e); }
  };

  window.deleteEntry = async (id) => {
    if (confirm("මෙම දත්තය මකා දැමීමට ඔබට විශ්වාසද?")) {
        try {
            await deleteDoc(doc(db, "parents", id));
            document.getElementById("card-"+id).remove();
            alert("සාර්ථකව මකා දැමුවා!");
        } catch(e) { alert("Error: " + e.message); }
    }
  };
</script>
</body>
</html>
